{% extends "base.html" %}

{% block title %}Edit Record - UnitConverter{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px;">
    <div class="back-bar">
        <a href="/history" class="btn-secondary">
            <svg viewBox="0 0 24 24">
                <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>
            </svg>
            Back to History
        </a>
    </div>

    <h2>✏️ Edit Conversion Record</h2>

    <!-- Error Block -->
    {% if error %}
        <div class="err-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            {{ error }}
        </div>
    {% endif %}

    <!-- Form -->
    <form method="POST">
        <!-- Readonly Current Source String -->
        <div class="input-group">
            <label>Original Input</label>
            <input type="text" value="{{ record.input_value }}" class="input-field" readonly>
        </div>

        <!-- Numeric input field to modify value -->
        <div class="input-group">
            <label for="updated_value">New Numeric Value ({{ record.input_value.split()[-1] }})</label>
            <input 
                type="number" 
                step="any"
                name="updated_value" 
                id="updated_value"
                class="input-field" 
                value="{{ current_val }}" 
                required 
                autocomplete="off"
            >
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 0.5rem;">Update Conversion</button>
    </form>
</div>
{% endblock %}
