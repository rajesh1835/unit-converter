<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Web Unit Converter{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="{{ url_for('static', filename='favicon.png') }}" alt="Logo" width="24" height="24" style="object-fit: contain;">
                Converter
            </a>
            <nav>
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--card-border); background: rgba(17, 24, 39, 0.3);">
        &copy; 2026 UnitConverter. Built with Flask & modern CSS.
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
