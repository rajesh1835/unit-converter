<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <style>
    table{
        text-align: center;
        width: 100%;
        height:200px;
        border-spacing:5px;
    }

    td,th{
        padding:10px;
    }

    a{
        height:50px;
        text-decoration: none;
        background-color: black;
        color: white;
        padding:8px 15px;
        border-radius: 10px;
    }

    h2{
        text-align: center;
        font-family: cursive;
    }

    .back-btn{
        margin-top: 10px;
        text-align:right;
        margin-bottom:10px;
    }
    button{
        height: 30px;
    }
</style>
</head>
<body>
    <div class="back-btn">
        <a href="/">Back</a>
    </div>
    <h2>Conversion History</h2>
    <table border="2" align="center">
        <thead>
            <th>Input</th>
            <th>Result</th>
            <th>Conversion Type</th>
            <th>Actions</th>
        </thead>
        <tbody>
            {% for row in history %}
            <tr>
                <td>{{ row.input_value}}</td>
                <td>{{ row.output_value}}</td>
                <td>{{ row.conversion_type}}</td>
                <td>
                    <a href="{{ url_for('edit_record', id=row.id)}}" name="link">Edit</a>
                    <br>
                    <br>
                    <form action="{{ url_for('delete_record', id=row.id) }}" method="POST">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
